version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - gocritic
    - godot
    - noctx
    - nlreturn
    - revive
    - wrapcheck
  exclusions:
    rules:
      - linters:
          - staticcheck
        text: "ST1005"
      - linters:
          - unused
        path: index\.go
        text: "executeRequest"
      # fastJSONMarshal/fastJSONUnmarshal are internal helpers; callers add context to errors.
      - linters:
          - wrapcheck
        path: client\.go
        text: "error returned from external package is unwrapped"
