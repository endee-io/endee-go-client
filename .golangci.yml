version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - gocritic
    - godot
    - noctx
    - nlreturn
    - wrapcheck
  disable:
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: false

issues:
  exclude:
    - "stutters"
    - "executeRequest is unused"
  exclude-rules:
    - linters:
        - staticcheck
      text: "ST1005"

    # fastJSONMarshal/fastJSONUnmarshal are internal helpers; callers add context to errors.
    - linters:
        - wrapcheck
      path: client\.go
      text: "error returned from external package is unwrapped"
